<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>О чём мне написать? (gif)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&subset=latin,cyrillic" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .tw-wrap {
    position: relative;
    width: min(70vh, 88vw);
  }

  .tw-img {
    width: 100%;
    height: auto;
    display: block;
    cursor: pointer;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* GIF-оверлей — точно поверх машинки, те же размеры */
  .stars-gif {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
  }
  .stars-gif.playing {
    opacity: 1;
  }

  .paper-text {
    position: absolute;
    left:   32%;
    right:  35%;
    top:    6%;
    height: 36%;

    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 8% 6% 3%;

    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #1a1a1a;
    text-align: center;
    word-break: break-word;

    pointer-events: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* --- char fade-in --- */
  @keyframes charIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .ch { animation: charIn 0.1s ease-out forwards; }

  .hint {
    position: absolute;
    bottom: -28px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(9px, 1.2vw, 13px);
    color: #aaa;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="tw-wrap" id="tw-wrap">
  <img class="tw-img" id="typewriter" src="Машинка.png" alt="Машинка">
  <!-- GIF поверх машинки, скрыт до клика -->
  <img class="stars-gif" id="stars-gif" src="" alt="">
  <div class="paper-text" id="paper-text"></div>
  <div class="hint">нажми на машинку</div>
</div>

<script>
const typewriter = document.getElementById('typewriter');
const paperText  = document.getElementById('paper-text');
const starsGif   = document.getElementById('stars-gif');

const GIF_SRC      = 'animation stars.gif';
const GIF_DURATION = 1200; /* подбери под реальную длину гифки (мс) */

/* ---- GIF burst ---- */
function burst() {
  /* Перезапуск гифки: сбрасываем src → ставим заново с cache-bust */
  starsGif.src = '';
  starsGif.classList.add('playing');
  starsGif.src = GIF_SRC + '?' + Date.now();
  clearTimeout(starsGif._hideTimer);
  starsGif._hideTimer = setTimeout(() => {
    starsGif.classList.remove('playing');
    starsGif.src = '';
  }, GIF_DURATION);
}

/* ---- dynamic font size ---- */
function calcFontSize(len) {
  const mobile = window.innerWidth < 640;
  if (mobile) {
    if (len <= 30) return '11px';
    if (len <= 55) return '9px';
    return '7px';
  }
  if (len <= 35) return '13px';
  if (len <= 60) return '11px';
  if (len <= 90) return '9px';
  return '8px';
}

/* ---- typewriter via rAF ---- */
function typeText(el, text) {
  el.textContent = '';
  const wrap = document.createElement('div');
  el.appendChild(wrap);
  const speed = Math.max(90, Math.min(140, 3500 / text.length));
  let i = 0, last = null;
  return new Promise(resolve => {
    function frame(ts) {
      if (last === null) last = ts;
      if (ts - last >= speed) {
        const s = document.createElement('span');
        s.className = 'ch';
        s.textContent = text[i++];
        wrap.appendChild(s);
        last = ts;
      }
      if (i < text.length) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

/* ---- fetch ideas ---- */
let cachedLines = null;
async function getLines() {
  if (cachedLines) return cachedLines;
  const r = await fetch(
    'https://raw.githubusercontent.com/writelikeagirl/ideasforwriting/refs/heads/main/ideas.txt'
  );
  cachedLines = (await r.text()).split('\n').filter(l => l.trim());
  return cachedLines;
}

/* ---- no-repeat history ---- */
const recentIdx = [];
const HISTORY = 8;
function pickLine(lines) {
  const pool = lines.map((_, i) => i).filter(i => !recentIdx.includes(i));
  const candidates = pool.length > 0 ? pool : lines.map((_, i) => i);
  const idx = candidates[Math.floor(Math.random() * candidates.length)];
  recentIdx.push(idx);
  if (recentIdx.length > HISTORY) recentIdx.shift();
  return lines[idx];
}

/* ---- click ---- */
let busy = false;
typewriter.addEventListener('click', async () => {
  if (busy) return;
  busy = true;
  burst();
  paperText.textContent = '';
  await new Promise(r => setTimeout(r, 900));
  try {
    const lines = await getLines();
    const line  = pickLine(lines);
    paperText.style.fontSize = calcFontSize(line.length);
    await typeText(paperText, line);
  } catch {
    paperText.textContent = 'Не удалось загрузить идеи :(';
  }
  busy = false;
});
</script>
</body>
</html>
