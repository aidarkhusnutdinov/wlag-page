<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>О чём мне написать?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&subset=latin,cyrillic" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .tw-wrap {
    position: relative;
    width: min(70vh, 88vw);
  }

  .tw-img {
    width: 100%;
    height: auto;
    display: block;
    cursor: pointer;
    user-select: none;
    -webkit-user-drag: none;
  }

  /*
    Машинка.png (4558×3869).
    Бумага (белая область) по X: 28.6%–73.4% от ширины.
    По Y: от ~6% до ~44% от высоты.
    Отступы: берём 30% горизонтально, 6% сверху, высота 36%.
    Внутри — ещё padding чтоб текст не лип к краям бумаги.
  */
  .paper-text {
    position: absolute;
    left:   32%;
    right:  35%;
    top:    6%;
    height: 36%;

    display: flex;
    align-items: flex-start;
    justify-content: center;
    /* внутренний отступ: % от ширины элемента */
    padding: 8% 6% 3%;

    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #1a1a1a;
    text-align: center;
    overflow-wrap: break-word;

    pointer-events: none;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* --- char fade-in --- */
  @keyframes charIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .ch { animation: charIn 0.1s ease-out forwards; word-break: normal; }

  /* --- sparkle --- */
  .sparkle {
    position: fixed;
    pointer-events: none;
    color: #e83030;
    font-weight: 700;
    z-index: 9999;
    line-height: 1;
    animation: spark 0.75s ease-out forwards;
  }
  @keyframes spark {
    0%   { opacity: 1; transform: scale(0.4) translate(0, 0); }
    55%  { opacity: 1; transform: scale(1.5) translate(var(--tx1), var(--ty1)); }
    100% { opacity: 0; transform: scale(0.8) translate(var(--tx2), var(--ty2)); }
  }

  .hint {
    position: absolute;
    bottom: -28px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(9px, 1.2vw, 13px);
    color: #aaa;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="tw-wrap" id="tw-wrap">
  <img class="tw-img" id="typewriter" src="Машинка.png" alt="Машинка">
  <div class="paper-text" id="paper-text"></div>
  <div class="hint">нажми на машинку</div>
</div>

<script>
const typewriter = document.getElementById('typewriter');
const paperText  = document.getElementById('paper-text');

/* ---- sparkle burst ---- */
function burst(cx, cy) {
  const n = 8;
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sparkle';
      const angle = (360 / n) * i + (Math.random() - 0.5) * 25;
      const rad   = angle * Math.PI / 180;
      const d1 = 30 + Math.random() * 40;
      const d2 = 60 + Math.random() * 70;
      el.style.setProperty('--tx1', Math.cos(rad) * d1 + 'px');
      el.style.setProperty('--ty1', Math.sin(rad) * d1 + 'px');
      el.style.setProperty('--tx2', Math.cos(rad) * d2 + 'px');
      el.style.setProperty('--ty2', Math.sin(rad) * d2 + 'px');
      el.style.left     = (cx - 8) + 'px';
      el.style.top      = (cy - 8) + 'px';
      el.style.fontSize = (11 + Math.random() * 13) + 'px';
      el.textContent    = '+';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }, i * 55);
  }
}

/* ---- dynamic font size: pre-render to measure actual fit ---- */
function measureFontSize(el, text) {
  const mobile = window.innerWidth < 640;
  const candidates = mobile
    ? ['11px', '9px', '8px', '7px']
    : ['13px', '11px', '9px', '8px'];
  const len = text.length;
  let start = 0;
  if (mobile) {
    if (len > 30) start = 1;
    if (len > 55) start = 3;
  } else {
    if (len > 35) start = 1;
    if (len > 60) start = 2;
    if (len > 90) start = 3;
  }

  el.style.opacity = '0';
  const probe = document.createElement('div');
  el.appendChild(probe);

  let chosen = candidates[candidates.length - 1];
  for (let i = start; i < candidates.length; i++) {
    el.style.fontSize = candidates[i];
    probe.textContent = text;
    if (el.scrollHeight <= el.clientHeight) {
      chosen = candidates[i];
      break;
    }
  }

  probe.remove();
  el.style.opacity = '1';
  return chosen;
}

/* ---- typewriter via rAF ---- */
function typeText(el, text) {
  el.textContent = '';
  const wrap = document.createElement('div');
  el.appendChild(wrap);
  const speed = Math.max(90, Math.min(140, 3500 / text.length));
  let i = 0, last = null;
  return new Promise(resolve => {
    function frame(ts) {
      if (last === null) last = ts;
      if (ts - last >= speed) {
        const s = document.createElement('span');
        s.className = 'ch';
        s.textContent = text[i++];
        wrap.appendChild(s);
        last = ts;
      }
      if (i < text.length) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

/* ---- fetch ideas ---- */
let cachedLines = null;
async function getLines() {
  if (cachedLines) return cachedLines;
  const r = await fetch(
    'https://raw.githubusercontent.com/writelikeagirl/ideasforwriting/refs/heads/main/ideas.txt'
  );
  cachedLines = (await r.text()).split('\n').filter(l => l.trim());
  return cachedLines;
}

/* ---- no-repeat history ---- */
const recentIdx = [];
const HISTORY = 8;
function pickLine(lines) {
  const pool = lines.map((_, i) => i).filter(i => !recentIdx.includes(i));
  const candidates = pool.length > 0 ? pool : lines.map((_, i) => i);
  const idx = candidates[Math.floor(Math.random() * candidates.length)];
  recentIdx.push(idx);
  if (recentIdx.length > HISTORY) recentIdx.shift();
  return lines[idx];
}

/* ---- click ---- */
let busy = false;
typewriter.addEventListener('click', async () => {
  if (busy) return;
  busy = true;
  const rect = typewriter.getBoundingClientRect();
  burst(rect.left + rect.width * 0.5, rect.top + rect.height * 0.15);
  paperText.textContent = '';
  await new Promise(r => setTimeout(r, 900));
  try {
    const lines = await getLines();
    const line  = pickLine(lines);
    paperText.style.fontSize = measureFontSize(paperText, line);
    await typeText(paperText, line);
  } catch {
    paperText.textContent = 'Не удалось загрузить идеи :(';
  }
  busy = false;
});
</script>
</body>
</html>
