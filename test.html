<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  body { margin: 40px; background: #f5f5f5; }
  .paper-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 8% 6% 3%;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #1a1a1a;
    text-align: center;
    overflow-wrap: break-word;
    background: white;
    width: 200px;
    border: 1px solid #ccc;
  }
  .ch { word-break: normal; }
  label { font-family: monospace; font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<label>overflow-wrap: break-word + .ch { word-break: normal }</label>
<div class="paper-text" id="out"></div>

<script>
const text = "Актриса, привидение, отель";
const wrap = document.createElement('div');
document.getElementById('out').appendChild(wrap);
for (const ch of text) {
  const s = document.createElement('span');
  s.className = 'ch';
  s.textContent = ch;
  wrap.appendChild(s);
}
</script>
</body>
</html>
